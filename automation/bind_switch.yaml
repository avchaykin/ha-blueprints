blueprint:
  name: Bind switch
  description: Bind one or more switch entities to light entities using toggle or sync mode.
  domain: automation
  source_url: https://raw.githubusercontent.com/avchaykin/ha-blueprints/main/automation/bind_switch.yaml
  input:
    switches:
      name: Switch bindings
      description: >-
        Map of switch entity_id to config object:
        { light: <light_entity_id>, mode: toggle|sync }
      selector:
        object: {}

mode: queued
max: 50

variables:
  bp_switches: !input switches

triggers:
  - trigger: event
    event_type: state_changed

conditions:
  - condition: template
    value_template: >-
      {% set eid = trigger.event.data.entity_id %}
      {{ eid in (bp_switches.keys() | list) }}
  - condition: template
    value_template: >-
      {{ trigger.event.data.old_state is not none and trigger.event.data.new_state is not none }}
  - condition: template
    value_template: >-
      {{ trigger.event.data.old_state.state != trigger.event.data.new_state.state }}
  - condition: template
    value_template: >-
      {% set old_s = trigger.event.data.old_state.state | lower %}
      {% set new_s = trigger.event.data.new_state.state | lower %}
      {{ old_s in ['on', 'off'] and new_s in ['on', 'off'] }}

actions:
  - variables:
      entity_id: "{{ trigger.event.data.entity_id }}"
      new_state: "{{ trigger.event.data.new_state.state }}"
      binding: "{{ bp_switches.get(entity_id, {}) }}"
      light_entity: "{{ binding.get('light') }}"
      link_mode: "{{ binding.get('mode', 'toggle') | lower }}"
  - condition: template
    value_template: "{{ light_entity is string and light_entity.startswith('light.') and link_mode in ['toggle', 'sync'] }}"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ link_mode == 'toggle' }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: "{{ light_entity }}"
      - conditions:
          - condition: template
            value_template: "{{ link_mode == 'sync' and new_state == 'on' }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: "{{ light_entity }}"
      - conditions:
          - condition: template
            value_template: "{{ link_mode == 'sync' and new_state == 'off' }}"
        sequence:
          - action: light.turn_off
            target:
              entity_id: "{{ light_entity }}"