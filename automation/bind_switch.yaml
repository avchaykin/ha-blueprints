blueprint:
  name: Bind switch
  description: Bind one or more switch entities to light entities using toggle or sync mode.
  domain: automation
  input:
    switches:
      name: Switch bindings
      description: >-
        Map of switch entity_id to config object:
        { light: <light_entity_id>, mode: toggle|sync }
      selector:
        object: {}

mode: queued
max: 50

variables:
  bp_switches: !input switches

triggers:
  - trigger: state
    entity_id: "{{ bp_switches.keys() | list }}"

conditions:
  - condition: template
    value_template: >-
      {{ trigger.from_state is not none and trigger.to_state is not none }}
  - condition: template
    value_template: >-
      {{ trigger.from_state.state != trigger.to_state.state }}

actions:
  - variables:
      entity_id: "{{ trigger.entity_id }}"
      new_state: "{{ trigger.to_state.state }}"
      binding: "{{ bp_switches.get(entity_id, {}) }}"
      light_entity: "{{ binding.get('light') }}"
      link_mode: "{{ binding.get('mode', '') | lower }}"
  - condition: template
    value_template: "{{ light_entity is string and light_entity.startswith('light.') and link_mode in ['toggle', 'sync'] }}"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ link_mode == 'toggle' }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: "{{ light_entity }}"
      - conditions:
          - condition: template
            value_template: "{{ link_mode == 'sync' and new_state == 'on' }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: "{{ light_entity }}"
      - conditions:
          - condition: template
            value_template: "{{ link_mode == 'sync' and new_state == 'off' }}"
        sequence:
          - action: light.turn_off
            target:
              entity_id: "{{ light_entity }}"