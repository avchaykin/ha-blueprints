blueprint:
  name: Bind switch
  description: Bind one or more switch entities to light entities using toggle or sync mode.
  domain: automation
  input:
    switches:
      name: Switch entities
      description: Switches that should trigger this automation.
      selector:
        entity:
          multiple: true
          domain: switch
    bindings:
      name: Bindings
      description: >-
        List of bindings. Each item must contain: switch, light, mode (toggle|sync).
      selector:
        object: {}

mode: queued
max: 50

variables:
  bp_switches: !input switches
  bp_bindings: !input bindings

triggers:
  - trigger: state
    entity_id: !input switches

conditions:
  - condition: template
    value_template: >-
      {{ trigger.from_state is not none and trigger.to_state is not none }}
  - condition: template
    value_template: >-
      {{ trigger.from_state.state != trigger.to_state.state }}

actions:
  - variables:
      entity_id: "{{ trigger.entity_id }}"
      new_state: "{{ trigger.to_state.state }}"
      binding: >-
        {{ (bp_bindings | selectattr('switch', 'equalto', entity_id) | list | first) }}
      light_entity: "{{ binding.light }}"
      link_mode: "{{ binding.mode | lower }}"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ link_mode == 'toggle' }}"
        sequence:
          - action: light.toggle
            target:
              entity_id: "{{ light_entity }}"
      - conditions:
          - condition: template
            value_template: "{{ link_mode == 'sync' and new_state == 'on' }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: "{{ light_entity }}"
      - conditions:
          - condition: template
            value_template: "{{ link_mode == 'sync' and new_state == 'off' }}"
        sequence:
          - action: light.turn_off
            target:
              entity_id: "{{ light_entity }}"