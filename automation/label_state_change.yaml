blueprint:
  name: Label state change notifier
  description: >-
    Triggers on state changes for entities in a selected Label and selected
    state transitions. Exposes helper variables for custom actions.
  domain: automation
  source_url: https://raw.githubusercontent.com/avchaykin/ha-blueprints/main/automation/label_state_change.yaml
  input:
    label_name:
      name: Label
      description: Select an existing Home Assistant label to monitor
      selector:
        label: {}

    state_transitions:
      name: State transition filters
      description: >-
        One transition per line (or separated by semicolon).
        Supported separators between FROM and TO states:
        "->", space, "-", or comma.
        Examples:
        off->on
        disconnected connected
        unavailable,connected
      default: |-
        off->on
        on->off
        disconnected->connected
        connected->disconnected
      selector:
        text:
          multiline: true

    actions:
      name: Actions
      description: >-
        Your actions to run when transition matches.
        Available variables:
        entity_id, entity_name, old_state, new_state,
        transition, change_type.
      selector:
        action: {}

mode: queued
max: 20

variables:
  bp_label_name: !input label_name
  bp_transition_filters: !input state_transitions

triggers:
  - trigger: event
    event_type: state_changed

conditions:
  - condition: template
    value_template: >-
      {% set e = trigger.event.data %}
      {% set eid = e.entity_id %}
      {% set old = e.old_state %}
      {% set new = e.new_state %}
      {% if eid is none or old is none or new is none %}
        false
      {% elif eid not in label_entities(bp_label_name) %}
        false
      {% else %}
        {% set pair = (old.state | string | lower) ~ '->' ~ (new.state | string | lower) %}
        {% set raw = (bp_transition_filters | string | lower).replace('\r', '') %}
        {% set rows = raw.replace(';', '\n').split('\n') | map('trim') | reject('equalto', '') | list %}
        {% set ns = namespace(pairs=[]) %}
        {% for row in rows %}
          {% set cleaned = row.replace('->', ' ').replace(',', ' ').replace('-', ' ') %}
          {% set tokens = cleaned.split() %}
          {% for i in range(0, (tokens | length // 2) * 2, 2) %}
            {% set ns.pairs = ns.pairs + [ (tokens[i] ~ '->' ~ tokens[i + 1]) ] %}
          {% endfor %}
        {% endfor %}
        {{ pair in ns.pairs }}
      {% endif %}

actions:
  - variables:
      entity_id: "{{ trigger.event.data.entity_id }}"
      entity_name: >-
        {{ state_attr(trigger.event.data.entity_id, 'friendly_name')
           or trigger.event.data.entity_id }}
      old_state: "{{ trigger.event.data.old_state.state }}"
      new_state: "{{ trigger.event.data.new_state.state }}"
      transition: "{{ old_state ~ '->' ~ new_state }}"
      change_type: >-
        {% set ns = new_state | string | lower %}
        {% if ns in ['off', 'disconnected', 'unavailable', 'unknown'] %}
          disconnected
        {% else %}
          connected
        {% endif %}

  - sequence: !input actions
